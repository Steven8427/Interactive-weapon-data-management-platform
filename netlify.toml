[build]
  command = "npm run build"
  publish = "build"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache pre-rendered HTML briefly so crawlers get fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Per-language SPA fallbacks (a static file is served first when it exists;
# these only catch unknown deep paths so the right language shell loads).
[[redirects]]
  from = "/en/*"
  to = "/en/index.html"
  status = 200
[[redirects]]
  from = "/ja/*"
  to = "/ja/index.html"
  status = 200
[[redirects]]
  from = "/ko/*"
  to = "/ko/index.html"
  status = 200
[[redirects]]
  from = "/zh-tw/*"
  to = "/zh-tw/index.html"
  status = 200

# Default (zh) SPA fallback - must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
